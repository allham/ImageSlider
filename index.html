<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Slider</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <div class="slider-container">
        <div class="header">
            <h2>image slider</h2>
            <h2>name holder</h2>
        </div>
        <div class="image-container">
            <img src="https://picsum.photos/id/1/900/700" alt="Picsum photos">
            <img src="https://picsum.photos/id/2/900/700" alt="Picsum photos">
            <img src="https://picsum.photos/id/10/900/700" alt="Picsum photos">
            <img src="https://picsum.photos/id/12/900/700" alt="Picsum photos">
            <img src="https://picsum.photos/id/13/900/700" alt="Picsum photos">
            <img src="https://picsum.photos/id/14/900/700" alt="Picsum photos">
            <img src="https://picsum.photos/id/15/900/700" alt="Picsum photos">
            <img src="https://picsum.photos/id/16/900/700" alt="Picsum photos">

            <link rel="style.css" type="text/css" href="style.css">
            <script src="index.js" defer async type="module"></script>
        </div>
        <i class="fa-etch fa-solid fa-angle-right btn next"></i>
        <i class="fa-etch fa-solid fa-angle-left btn prev"></i>        
    </div>
    <p></p>
</body>
</html>
